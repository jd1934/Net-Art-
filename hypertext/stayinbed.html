<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stay in Bed</title>

  <style>
    body {
      background-color: #1a2640; /* deep cozy blue */
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
      color: white;
    }

    img {
      width: 80%;
      max-width: 500px;
      border-radius: 20px;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    h1 {
      font-weight: 700;
      font-size: 2.4rem;
      color: white;
      background-color: #2e3d63;
      padding: 15px 25px;
      border-radius: 25px;
      margin: 0 auto 30px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      width: fit-content;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 40px auto;
      line-height: 1.7;
      opacity: 0.85;
    }

    a {
      display: block;
      font-weight: bold;
      color: #9bb4ff;
      text-decoration: none;
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    a:hover {
      color: #c7d6ff;
    }
  </style>
</head>

<body>

  <img src="images/stayinbed.jpg">

  <h1>Stay in Bed</h1>

  <p>
    I pull the blanket back over my head and let myself sink into the mattress.  
    The room is quiet and the world feels far away. I know I should get up,  
    but for now I let myself drift and pretend the day hasn’t started yet.
  </p>

</html>
